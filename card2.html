<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User card 2</title>
    <link rel="stylesheet" href="./assets/css/reset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="./assets/css/style_card2.css">
</head>
<body>
    <main class="content-wrap">
        <article class="user-card">
                <button class="main-menu">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </button>
                <div class="user-avatar">
                    <img class="user-avatar-img" src="./assets/images/man2.jpg" alt="man_avatar">
                    <i class="status fa-solid fa-check"></i>
                </div>
                <h2 class="card-h2">Vel Kumar P</h2>
                <p class="desc">UI/UX Designer</p>
                <ul class="social-info">
                    <li>
                        <p class="title">Projects</p>
                        <p class="value">11</p>
                    </li>
                    <li>
                        <p class="title">Following</p>
                        <p class="value">250</p>
                    </li>
                    <li>
                        <p class="title">Followers</p>
                        <p class="value">185</p>
                    </li>
                </ul>
                <p class="main-text">Lorem ipsum dolor sit amet consectetur adipisicing elit. Cum porro iste, illum eligendi
                    commodi
                    quae quasi veritatis assumenda odio, perspiciatis fugit!</p>
                <div class="contact-links">
                    <i class="social-icon-size twitter fa-brands fa-twitter"></i>
                    <i class="social-icon-size facebook fa-brands fa-facebook-f"></i>
                    <i class="social-icon-size google fa-brands fa-google-plus-g"></i>
                    <i class="social-icon-size behance fa-brands fa-behance"></i>
                </div>
                <a class="btn-link" href="#none">View Profile</a>
        </article>
    </main>
</body>
</html>
