<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User card 1</title>
    <link rel="stylesheet" href="./assets/css/reset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer">
    <link rel="stylesheet" href="./assets/css/style_card1.css">
</head>
<body>
    <main class="content-wrap">
        <article class="user-card">
            <div class="white-zone">
                <div class="user-avatar">
                    <img class="user-avatar-img" src="./assets/images/man.jpg" alt="man_avatar">
                    <i class="user-star  fa-solid fa-star"></i>
                </div>

                <p class="card-desc">Film Director, Producer</p>
                <p class="main-text desc">€14/hour</p>
            </div>
            <div class="gray-zone">
                <h2 class="card-h2">Jeffrey Abrams, 51</h2>
                <p class="main-text locate"><i class="fa-solid fa-location-dot"></i> New York, United States</p>
                <p class="main-text bio">Abrams was born in New York City and raised in Los Angeles</p>
                <div class="card-btn">
                    <a class="line-bg-btn" href="#none">View cv</a>
                    <a class="full-bg-btn" href="#none">Make offer</a>
                </div>
                <p class="status"><i class="social-status fa-solid fa-circle"></i> Online</p>
            </div>
        </article>
    </main>
</body>
</html>
